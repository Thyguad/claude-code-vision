name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  macos-check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run check:macos

  windows-check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: npm ci
      - run: npm run check:node
      - shell: pwsh
        run: |
          dotnet publish windows/ClaudeCodeVision.Windows/ClaudeCodeVision.Windows.csproj -c Release -r win-x64 --self-contained true -o build/windows-tray
          $env:EMBEDDED_NODE_PATH = (Get-Command node).Source
          $env:EMBEDDED_NODE_LICENSE = Join-Path (Split-Path $env:EMBEDDED_NODE_PATH) "LICENSE"
          npm run package:windows-runtime
          npm run package:windows-portable
          if (-not (Test-Path dist/windows-runtime/service/cli.mjs)) { throw "service CLI missing" }
          if (-not (Test-Path dist/ClaudeCode-Vision-windows-x64/ClaudeCode-Vision.exe)) { throw "tray executable missing" }
          if (-not (Test-Path dist/ClaudeCode-Vision-windows-x64/runtime/node/node.exe)) { throw "embedded Node runtime missing" }
          if (-not (Test-Path dist/ClaudeCode-Vision-windows-x64/runtime/node/LICENSE)) { throw "Node license missing" }
          if (-not (Test-Path dist/ClaudeCode-Vision-windows-x64/runtime/node_modules/undici)) { throw "production dependencies missing" }
          if (-not (Test-Path dist/ClaudeCode-Vision-windows-x64/BUILD-INFO.json)) { throw "build metadata missing" }
          Compress-Archive -Path dist/ClaudeCode-Vision-windows-x64/* -DestinationPath dist/ClaudeCode-Vision-windows-x64.zip
          (Get-FileHash dist/ClaudeCode-Vision-windows-x64.zip -Algorithm SHA256).Hash.ToLower() + "  ClaudeCode-Vision-windows-x64.zip" | Set-Content dist/ClaudeCode-Vision-windows-x64.zip.sha256 -NoNewline -Encoding ascii
          choco install innosetup --no-progress -y
          $version = (Get-Content package.json | ConvertFrom-Json).version
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DAppVersion=$version" windows/installer/ClaudeCodeVision.iss
          $installer = Get-ChildItem dist/installer/*-setup.exe | Select-Object -First 1
          (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLower() + "  " + $installer.Name | Set-Content ($installer.FullName + ".sha256") -NoNewline -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: ClaudeCode-Vision-windows-x64
          path: |
            dist/ClaudeCode-Vision-windows-x64.zip
            dist/ClaudeCode-Vision-windows-x64.zip.sha256
            dist/installer/*-setup.exe
            dist/installer/*-setup.exe.sha256
